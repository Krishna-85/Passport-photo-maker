<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passport Photo Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-border: rgba(148, 163, 184, 0.18);
      --panel-muted: #1f2937;
      --text: #e5eefb;
      --text-soft: #9fb0cc;
      --accent: #38bdf8;
      --accent-strong: #0284c7;
      --danger: #f87171;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 88px 24px 24px;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
    }

    .panel {
      width: min(100%, 720px);
      padding: 32px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: rgba(17, 24, 39, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.5rem);
      line-height: 1.1;
      text-align: center;
      color: #7dd3fc;
    }

    .subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: var(--text-soft);
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      color: var(--text-soft);
    }

    input,
    select,
    button,
    embed {
      width: 100%;
      border-radius: 14px;
    }

    input,
    select {
      border: 1px solid transparent;
      padding: 14px 16px;
      background: var(--panel-muted);
      color: var(--text);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.75);
      transform: translateY(-1px);
    }

    input[type="file"] {
      padding: 12px;
      min-width: 0;
    }

    button {
      border: none;
      padding: 15px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(2, 132, 199, 0.28);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .status {
      min-height: 24px;
      margin: 4px 0 0;
      font-size: 0.95rem;
      color: var(--text-soft);
    }

    .status.error {
      color: var(--danger);
    }

    .preview {
      width: 100%;
      height: 500px;
      margin-top: 12px;
      border: 1px solid var(--panel-border);
      background: white;
    }

    .hidden {
      display: none;
    }

    #cropModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 6, 23, 0.82);
      backdrop-filter: blur(8px);
    }

    .crop-box {
      width: min(100%, 540px);
      max-height: min(90vh, 760px);
      overflow: auto;
      padding: 24px;
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      background: rgba(17, 24, 39, 0.96);
      box-shadow: var(--shadow);
    }

    .crop-image-wrap {
      overflow: hidden;
      border-radius: 16px;
      background: #0b1220;
    }

    #cropImage {
      display: block;
      max-width: 100%;
    }

    .crop-actions {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .api-key-row {
      display: grid;
      gap: 12px;
      margin-top: 15px;
    }

    .settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: auto;
      max-width: calc(100vw - 32px);
      padding: 12px 16px;
      z-index: 1001;
    }

    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.7);
    }

    .settings-panel {
      width: min(100%, 500px);
      max-height: min(90vh, 760px);
      overflow: auto;
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 20px;
      background: #111827;
      box-shadow: var(--shadow);
    }

    .settings-panel h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .settings-footer {
      margin-top: 16px;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text-soft);
    }

    @media (max-width: 640px) {
      body {
        display: block;
        padding: 76px 12px 12px;
      }

      .panel {
        width: 100%;
        padding: 22px;
        border-radius: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      button,
      input,
      select {
        font-size: 16px;
      }

      .preview {
        height: 52vh;
        min-height: 260px;
      }

      .settings-btn {
        top: 12px;
        right: 12px;
        padding: 10px 14px;
        font-size: 0.95rem;
      }

      .settings-modal,
      #cropModal {
        padding: 12px;
      }

      .settings-panel,
      .crop-box {
        width: 100%;
        padding: 18px;
        border-radius: 18px;
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 1.8rem;
      }

      .subtitle {
        margin-bottom: 20px;
        font-size: 0.95rem;
      }

      .stack {
        gap: 14px;
      }

      .preview {
        height: 48vh;
      }
    }
  </style>
</head>
<body>
  <button id="settingsBtn" class="settings-btn" type="button">
    ⚙️ Settings
  </button>

  <main class="panel">
    <h1>Passport Photo Pro</h1>
    <p class="subtitle">Upload your images and generate a print-ready PDF layout.</p>

    <section class="stack">
      <label for="imageInput">
        Photos
        <input type="file" id="imageInput" accept="image/*" />
      </label>

      <div class="grid">
        <label for="width">
          Width
          <input type="number" id="width" value="120" placeholder="Width" />
        </label>

        <label for="height">
          Height
          <input type="number" id="height" value="150" placeholder="Height" />
        </label>
      </div>

      <label for="copies">
        Copies per photo
        <input type="number" id="copies" value="4" placeholder="Copies" />
      </label>

      <label for="bgColor">
        Background color
        <select id="bgColor">
          <option value="white">White</option>
          <option value="#cfe8ff">Light Blue</option>
          <option value="#f8d7da">Light Red</option>
          <option value="#e5e7eb">Gray</option>
        </select>
      </label>

      <button id="validateBtn" type="button">🤖 Validate with AI</button>
      <div id="aiResult" class="status"></div>

      <button id="generateBtn" type="button">Generate PDF</button>
      <p id="statusMessage" class="status" aria-live="polite"></p>

      <embed id="pdfPreview" class="preview hidden" type="application/pdf" />
    </section>
  </main>

  <div id="settingsModal" class="settings-modal hidden">
    <div class="settings-panel">
      <h2>AI Settings</h2>

      <div class="stack">
        <label for="removeBgKey">
          remove.bg API Key
          <input id="removeBgKey" placeholder="Paste remove.bg key" />
        </label>

        <label for="llmKey">
          Gemini / OpenAI API Key
          <input id="llmKey" placeholder="Paste Gemini or OpenAI key" />
        </label>

        <button id="saveSettingsBtn" type="button">Save Settings</button>
        <button id="closeSettingsBtn" type="button">Close</button>
      </div>

      <div class="settings-footer">Made with love ❤️ by Developer Krishna</div>
    </div>
  </div>

  <div id="cropModal">
    <div class="crop-box">
      <div class="crop-image-wrap">
        <img id="cropImage" alt="Crop preview" />
      </div>
      <div class="crop-actions">
        <button id="saveCropBtn" type="button">Save Crop</button>
      </div>
    </div>
  </div>

  <script>
    const generateBtn = document.getElementById("generateBtn");
    const validateBtn = document.getElementById("validateBtn");
    const imageInput = document.getElementById("imageInput");
    const pdfPreview = document.getElementById("pdfPreview");
    const statusMessage = document.getElementById("statusMessage");
    const aiResult = document.getElementById("aiResult");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsModal = document.getElementById("settingsModal");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const bgColorSelect = document.getElementById("bgColor");
    const cropModal = document.getElementById("cropModal");
    const cropImage = document.getElementById("cropImage");
    const saveCropBtn = document.getElementById("saveCropBtn");

    let cropper = null;
    let croppedBlob = null;
    let cropImageUrl = "";

    function getBackendOrigin() {
      const isHttpPage = window.location.protocol === "http:" || window.location.protocol === "https:";
      if (isHttpPage) {
        return window.location.origin;
      }

      return "http://localhost:5000";
    }

    function setStatus(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.classList.toggle("error", isError);
    }

    async function buildRequestError(response) {
      const errorText = await response.text();

      if (response.status === 404 && errorText.includes("Cannot POST /process")) {
        return new Error("Backend route /process was not found. Restart the Node server with `node server.js` and open the app from that server.");
      }

       if (response.status === 404 && errorText.includes("Cannot POST /validate-photo")) {
        return new Error("Backend route /validate-photo was not found. Restart the Node server with `node server.js`.");
      }

      return new Error(errorText || `Request failed with status ${response.status}`);
    }

    function resetCropper() {
      if (cropper) {
        cropper.destroy();
        cropper = null;
      }

      if (cropImageUrl) {
        URL.revokeObjectURL(cropImageUrl);
        cropImageUrl = "";
      }
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      croppedBlob = null;

      if (!file) {
        resetCropper();
        cropModal.style.display = "none";
        return;
      }

      resetCropper();
      cropImageUrl = URL.createObjectURL(file);
      cropImage.src = cropImageUrl;
      cropModal.style.display = "flex";

      cropImage.onload = () => {
        cropImage.onload = null;
        cropper = new Cropper(cropImage, {
          aspectRatio: 35 / 45,
          viewMode: 1,
          autoCropArea: 1,
          responsive: true
        });
      };
    });

    saveCropBtn.addEventListener("click", () => {
      if (!cropper) {
        setStatus("Cropper is not ready yet.", true);
        return;
      }

      const canvas = cropper.getCroppedCanvas({
        width: 413,
        height: 531
      });

      canvas.toBlob((blob) => {
        croppedBlob = blob;
        cropModal.style.display = "none";
        resetCropper();
        setStatus("Crop saved. You can generate the PDF now.");
      }, "image/png");
    });

    settingsBtn.addEventListener("click", () => {
      settingsModal.classList.remove("hidden");
    });

    closeSettingsBtn.addEventListener("click", () => {
      settingsModal.classList.add("hidden");
    });

    saveSettingsBtn.addEventListener("click", () => {
      localStorage.setItem(
        "REMOVE_BG_API_KEY",
        document.getElementById("removeBgKey").value
      );

      localStorage.setItem(
        "LLM_API_KEY",
        document.getElementById("llmKey").value
      );

      setStatus("AI settings saved successfully ✅");
      settingsModal.classList.add("hidden");
    });

    document.getElementById("validateBtn").addEventListener("click", async () => {
      const llmKey = localStorage.getItem("LLM_API_KEY");
      const file = imageInput.files[0];

      if (!file) {
        setStatus("Upload image first", true);
        return;
      }

      const formData = new FormData();
      formData.append("image", croppedBlob || file);
      formData.append("llmKey", llmKey || "");

      try {
        aiResult.textContent = "Validating photo...";

        const response = await fetch(`${getBackendOrigin()}/validate-photo`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw await buildRequestError(response);
        }

        const data = await response.json();
        document.getElementById("aiResult").textContent = data.result;
      } catch (error) {
        aiResult.textContent = error.message || "AI validation failed";
      }
    });

    generateBtn.addEventListener("click", async () => {
      const file = imageInput.files[0];
      if (!file) {
        setStatus("Please upload at least one image.", true);
        return;
      }

      const apiKey = localStorage.getItem("REMOVE_BG_API_KEY");
      const llmKey = localStorage.getItem("LLM_API_KEY");
      const formData = new FormData();
      formData.append("image_0", croppedBlob || file, "passport-photo.png");
      formData.append("copies_0", document.getElementById("copies").value);

      formData.append("width", document.getElementById("width").value);
      formData.append("height", document.getElementById("height").value);
      formData.append("spacing", "10");
      formData.append("bgColor", bgColorSelect.value);
      formData.append("removeBgKey", apiKey);
      formData.append("llmKey", llmKey);

      generateBtn.disabled = true;
      setStatus("Generating PDF...");

      try {
        const response = await fetch(`${getBackendOrigin()}/process`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw await buildRequestError(response);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        pdfPreview.src = url;
        pdfPreview.classList.remove("hidden");
        setStatus("PDF generated successfully.");
      } catch (error) {
        pdfPreview.classList.add("hidden");
        pdfPreview.removeAttribute("src");
        setStatus(error.message || "Unable to generate the PDF.", true);
      } finally {
        generateBtn.disabled = false;
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("removeBgKey").value =
        localStorage.getItem("REMOVE_BG_API_KEY") || "";

      document.getElementById("llmKey").value =
        localStorage.getItem("LLM_API_KEY") || "";
    });
  </script>
</body>
</html>
